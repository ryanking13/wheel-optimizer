name: Benchmark

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -e . --group test
      - name: Run benchmark
        run: pytest -m benchmark -v -s
        env:
          BENCHMARK_OUTPUT: benchmark-results.md
      - name: Post results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const path = 'benchmark-results.md';
            if (!fs.existsSync(path)) {
              console.log('No benchmark results file found');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Wheel Optimizer Benchmark Results';
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
